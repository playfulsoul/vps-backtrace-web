<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>万能 VPS 多节点回程路由自动化评测系统</title>
    <!-- 引入高颜值 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 antialiased p-6">

    <div class="max-w-6xl mx-auto">
        <!-- 表头 -->
        <header class="mb-8 text-center md:text-left">
            <h1 class="text-3xl font-extrabold text-indigo-600 mb-2">🚀 万能 VPS 回程路由分析矩阵</h1>
            <p class="text-gray-500 text-sm">自定义 Payload 模板技术 · 完美兼容各类机房 LG 引擎 · 纯前端异步防封</p>
        </header>

        <hr class="border-gray-200 mb-8">

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- 左侧控制面板 -->
            <div class="lg:col-span-1 space-y-6">
                <!-- API 输入 -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <label class="block text-sm font-bold text-gray-700 mb-2">第一步：填写 Looking Glass API 地址 (每行一个)</label>
                    <textarea id="apiUrls" rows="3" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-mono text-xs" placeholder="https://lg-sg-singapore.rabisu.com/lg-api.php"></textarea>
                </div>

                <!-- 新增：万能 Payload 模板自定义框 -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <div class="flex items-center justify-between mb-2">
                        <label class="text-sm font-bold text-gray-700">第二步：配置万能 Payload 模板</label>
                        <span class="text-[10px] text-indigo-600 bg-indigo-50 px-1.5 py-0.5 rounded font-semibold font-mono">支持 {{IP}} 和 {{LOC}}</span>
                    </div>
                    <textarea id="payloadTemplate" rows="4" class="w-full p-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 font-mono text-xs bg-gray-900 text-green-400">{"command": "traceroute", "host": "{{IP}}", "location": "{{LOC}}"}</textarea>
                    <p class="text-[10px] text-gray-400 mt-1">⚠️ 抓包后将目标 IP 改为 <code class="font-bold text-gray-600">{{IP}}</code>，节点位置改为 <code class="font-bold text-gray-600">{{LOC}}</code> 即可通用。</p>
                </div>

                <!-- 城市选择与自定义IP -->
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                    <label class="block text-sm font-bold text-gray-700 mb-3">第三步：选择测试目标 (内置枢纽或个性化定制)</label>
                    <div id="cityContainer" class="space-y-2 max-h-48 overflow-y-auto pr-2 text-sm">
                        <!-- 由 JS 动态渲染内置城市单选框 -->
                    </div>

                    <!-- 动态抽屉：自定义 IP 输入框 -->
                    <div id="customIPInputs" class="mt-4 p-4 bg-indigo-50/50 rounded-xl space-y-3 hidden border border-indigo-100">
                        <div class="flex items-center justify-between border-b border-indigo-100 pb-2 mb-2">
                            <p class="text-xs text-indigo-600 font-bold">🛠️ 个性化测试目标 IP：</p>
                            <button type="button" id="detectBtn" onclick="detectLocalIP()" class="text-[10px] bg-indigo-600 hover:bg-indigo-700 text-white px-2 py-1 rounded-md transition duration-150 flex items-center space-x-1 font-semibold">
                                <span>🌐 一键识别本机 IP</span>
                            </button>
                        </div>
                        <div>
                            <label class="block text-[11px] font-medium text-gray-500 mb-1">测试 目标一 (电信轴/当前网)</label>
                            <input type="text" id="customTelecom" class="w-full p-2 border border-gray-200 rounded-lg text-xs font-mono focus:outline-none" placeholder="例如: 219.141.140.10">
                        </div>
                        <div>
                            <label class="block text-[11px] font-medium text-gray-500 mb-1">测试 目标二 (联通轴/当前网)</label>
                            <input type="text" id="customUnicom" class="w-full p-2 border border-gray-200 rounded-lg text-xs font-mono focus:outline-none" placeholder="例如: 202.106.195.68">
                        </div>
                        <div>
                            <label class="block text-[11px] font-medium text-gray-500 mb-1">测试 目标三 (移动轴/当前网)</label>
                            <input type="text" id="customMobile" class="w-full p-2 border border-gray-200 rounded-lg text-xs font-mono focus:outline-none" placeholder="例如: 221.179.155.161">
                        </div>
                    </div>
                </div>

                <!-- 触发按钮 -->
                <button id="runBtn" onclick="startAnalysis()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl shadow-md shadow-indigo-100 transition duration-200 flex items-center justify-center space-x-2">
                    <span>🔥 开始批量回程分析</span>
                </button>
            </div>

            <!-- 右侧结果展示区 -->
            <div class="lg:col-span-2 space-y-6">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 min-h-[400px]">
                    <div class="flex items-center justify-between mb-4 border-b border-gray-100 pb-3">
                        <h2 class="text-lg font-bold text-gray-800">📊 综合评测报告输出</h2>
                        <span id="statusLabel" class="text-xs font-semibold px-2.5 py-1 rounded-full bg-gray-100 text-gray-500">就绪</span>
                    </div>
                    
                    <!-- 动态状态条 -->
                    <div id="progressBar" class="w-full bg-gray-100 h-1.5 rounded-full mb-4 hidden">
                        <div id="progressInner" class="bg-indigo-600 h-1.5 rounded-full w-0 transition-all duration-300"></div>
                    </div>

                    <!-- 报告卡片容器 -->
                    <div id="reportContainer" class="space-y-6">
                        <p class="text-gray-400 text-center py-16 text-sm">暂无数据，请在左侧配置参数并点击开始。</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 核心逻辑脚本 -->
    <script>
        const ipDatabase = {
            "北京核心网 (华北枢纽)": { telecom: "219.141.140.10", unicom: "202.106.195.68", mobile: "221.179.155.161" },
            "上海核心网 (华东枢纽)": { telecom: "202.96.209.133", unicom: "210.22.97.1", mobile: "211.136.112.200" },
            "广州核心网 (华南枢纽)": { telecom: "58.60.188.222", unicom: "210.21.196.6", mobile: "120.196.165.24" },
            "成都核心网 (西南枢纽)": { telecom: "61.139.2.69", unicom: "119.6.6.6", mobile: "211.137.96.205" }
        };

        function analyzeRoute(rawText) {
            if (!rawText) return "❌ 探测失败 / 接口无响应";
            let report = [];
            if (rawText.includes("9929") || rawText.includes("CUII")) report.push("💎 联通 A 网精品专线 (AS9929)");
            else if (rawText.includes("58453") || rawText.includes("CMI")) report.push("🚀 移动正牌 CMI 直连航线");
            else if (rawText.includes("4837")) report.push("🥈 联通 4837 普通民用直连");
            else if (rawText.includes("4134") || rawText.includes("202.97")) report.push("🛑 电信 163 普通骨干网");
            else if (rawText.includes("9808")) report.push("🟢 移动普通 CMNET 线路");
            else report.push("⚠️ 传统 BGP 混合国际公网");

            if (rawText.includes("gin.ntt.net")) report.push("🇯🇵 经由日本 NTT 中转");
            if (rawText.includes("cogentco.com")) report.push("🚌 经由 Cogent 欧洲大巴中转");
            if (rawText.includes("retn.net")) report.push("⚡ 经由 RETN 欧洲高速骨干中转");
            if (rawText.includes("comcast")) report.push("🇺🇸 经由美西 Comcast 本地移交");

            return report.join(" | ");
        }

        function parseLocation(url) {
            try {
                const hostname = new URL(url).hostname;
                if (hostname.includes("singapore")) return "singapore";
                if (hostname.includes("la") || hostname.includes("los-angeles")) return "los-angeles";
                if (hostname.includes("london")) return "london";
                if (hostname.includes("germany")) return "germany";
                return "default";
            } catch (e) { return "singapore"; }
        }

        const delay = ms => new Promise(res => setTimeout(res, ms));

        // 渲染内置城市列表
        const container = document.getElementById("cityContainer");
        Object.keys(ipDatabase).forEach((cityName, index) => {
            const div = document.createElement("div");
            div.className = "flex items-center space-x-3 p-2 hover:bg-gray-50 rounded-lg transition cursor-pointer";
            div.innerHTML = `
                <input type="radio" id="city_${index}" name="targetCity" value="${cityName}" ${index === 0 ? 'checked' : ''} class="h-4 w-4 text-indigo-600 border-gray-300 focus:ring-indigo-500" onchange="toggleCustomInputs(false)">
                <label for="city_${index}" class="font-medium text-gray-700 cursor-pointer w-full">${cityName}</label>
            `;
            container.appendChild(div);
        });

        const customDiv = document.createElement("div");
        customDiv.className = "flex items-center space-x-3 p-2 hover:bg-gray-50 rounded-lg transition cursor-pointer border-t border-gray-100 mt-2 pt-2";
        customDiv.innerHTML = `
            <input type="radio" id="city_custom" name="targetCity" value="CUSTOM_MODE" class="h-4 w-4 text-indigo-600 border-gray-300 focus:ring-indigo-500" onchange="toggleCustomInputs(true)">
            <label for="city_custom" class="font-bold text-indigo-600 cursor-pointer w-full">🛠️ 自定义测试 IP</label>
        `;
        container.appendChild(customDiv);

        function toggleCustomInputs(show) {
            const inputDrawer = document.getElementById("customIPInputs");
            inputDrawer.classList.toggle("hidden", !show);
        }

        async function detectLocalIP() {
            const detectBtn = document.getElementById("detectBtn");
            detectBtn.disabled = true;
            detectBtn.innerHTML = "<span>🔍 正在识别...</span>";
            try {
                const response = await fetch("https://api.ipify.org?format=json");
                const data = await response.json();
                document.getElementById("customTelecom").value = data.ip;
                document.getElementById("customUnicom").value = data.ip;
                document.getElementById("customMobile").value = data.ip;
                detectBtn.innerHTML = "<span>✅ 成功</span>";
            } catch (error) {
                detectBtn.innerHTML = "<span>❌ 失败</span>";
            }
            setTimeout(() => {
                detectBtn.className = "text-[10px] bg-indigo-600 hover:bg-indigo-700 text-white px-2 py-1 rounded-md transition duration-150 flex items-center space-x-1 font-semibold";
                detectBtn.innerHTML = "<span>🌐 一键识别本机 IP</span>";
                detectBtn.disabled = false;
            }, 1500);
        }

        // 核心探测函数
        async function startAnalysis() {
            const apiText = document.getElementById("apiUrls").value.trim();
            const templateText = document.getElementById("payloadTemplate").value.trim();
            if (!apiText) return alert("请填写 Looking Glass API 地址！");
            if (!templateText) return alert("请配置 Payload 模板！");
            
            const apis = apiText.split("\n").map(url => url.trim()).filter(url => url);
            const selectedCity = document.querySelector('input[name="targetCity"]:checked').value;
            
            let targetIPs = selectedCity === "CUSTOM_MODE" ? 
                { telecom: document.getElementById("customTelecom").value.trim(), unicom: document.getElementById("customUnicom").value.trim(), mobile: document.getElementById("customMobile").value.trim() } : 
                ipDatabase[selectedCity];

            if (!targetIPs.telecom || !targetIPs.unicom || !targetIPs.mobile) return alert("测试IP不完整！");

            const btn = document.getElementById("runBtn");
            const statusLabel = document.getElementById("statusLabel");
            const progressContainer = document.getElementById("progressBar");
            const progressInner = document.getElementById("progressInner");
            const reportContainer = document.getElementById("reportContainer");

            btn.disabled = true;
            btn.className = "w-full bg-gray-400 text-white font-bold py-3 px-6 rounded-xl cursor-not-allowed flex items-center justify-center space-x-2";
            statusLabel.innerText = "正在硬核探测中...";
            progressContainer.classList.remove("hidden");
            reportContainer.innerHTML = ""; 

            const isps = [
                { key: "telecom", name: "线路一 (电信轴/全网)", icon: "🔵" },
                { key: "unicom", name: "线路二 (联通轴/全网)", icon: "🔴" },
                { key: "mobile", name: "线路三 (移动轴/全网)", icon: "🟢" }
            ];

            const totalSteps = apis.length * isps.length;
            let currentStep = 0;

            for (let i = 0; i < apis.length; i++) {
                const apiUrl = apis[i];
                const locationKey = parseLocation(apiUrl);

                const card = document.createElement("div");
                card.className = "bg-white p-5 rounded-2xl border border-gray-100 shadow-sm space-y-3";
                card.innerHTML = `
                    <div class="flex items-center justify-between border-b border-gray-100 pb-2">
                        <h3 class="font-bold text-indigo-700 text-sm md:text-base break-all">📍 节点: ${apiUrl}</h3>
                        <span class="text-xs bg-indigo-50 text-indigo-600 px-2 py-0.5 rounded font-mono uppercase">${locationKey}</span>
                    </div>
                    <div id="results_pool_${i}" class="space-y-2 text-xs md:text-sm"></div>
                `;
                reportContainer.appendChild(card);
                const pool = document.getElementById(`results_pool_${i}`);

                for (let j = 0; j < isps.length; j++) {
                    const isp = isps[j];
                    const targetIP = targetIPs[isp.key];

                    const row = document.createElement("div");
                    row.className = "flex flex-col md:flex-row md:items-center justify-between p-2.5 bg-gray-50 border border-gray-200/40 rounded-xl space-y-1 md:space-y-0";
                    row.innerHTML = `
                        <div class="flex items-center space-x-2 font-semibold text-gray-700 min-w-[150px]">
                            <span>${isp.icon} ${isp.name}</span>
                            <span class="text-[10px] text-gray-400 font-mono font-normal">(${targetIP})</span>
                        </div>
                        <div id="status_${i}_${j}" class="text-gray-400 italic">正在请求机房测序...</div>
                    `;
                    pool.appendChild(row);

                    try {
                        // 🌟 降维打击核心：在发送前，将用户自定义模板里的 {{IP}} 和 {{LOC}} 动态替换掉
                        let processedPayloadStr = templateText
                            .replace("{{IP}}", targetIP)
                            .replace("{{LOC}}", locationKey);

                        // 自动判断用户填的是 JSON 字符串还是 Form 表单数据
                        let headers = {};
                        let bodyData = processedPayloadStr;
                        
                        if (processedPayloadStr.trim().startsWith("{")) {
                            headers["Content-Type"] = "application/json";
                            bodyData = JSON.stringify(JSON.parse(processedPayloadStr));
                        } else {
                            headers["Content-Type"] = "application/x-www-form-urlencoded";
                        }

                        const response = await fetch(apiUrl, {
                            method: "POST",
                            headers: headers,
                            body: bodyData
                        });

                        const rawText = await response.text();
                        const analysisResult = analyzeRoute(rawText);

                        const statusBox = document.getElementById(`status_${i}_${j}`);
                        statusBox.className = "text-gray-700 font-medium md:text-right font-sans";
                        statusBox.innerHTML = `<span>${analysisResult}</span>`;

                    } catch (error) {
                        document.getElementById(`status_${i}_${j}`).className = "text-red-500 font-medium";
                        document.getElementById(`status_${i}_${j}`).innerText = "❌ 跨域封锁、模板错误或机房断流";
                    }

                    currentStep++;
                    progressInner.style.width = `${(currentStep / totalSteps) * 100}%`;
                    await delay(800);
                }
            }

            btn.disabled = false;
            btn.className = "w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-6 rounded-xl shadow-md shadow-indigo-100 transition duration-200 flex items-center justify-center space-x-2";
            statusLabel.className = "text-xs font-semibold px-2.5 py-1 rounded-full bg-green-100 text-green-700";
            statusLabel.innerText = "完成";
        }
    </script>
</body>
</html>
